<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para el Mejor Novio ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4e88,#ff85a2,#ffd1dc);
    overflow:hidden;
}

/* Corazones animados */
.corazon{
    position:absolute;
    color:white;
    font-size:20px;
    animation:flotar 8s linear infinite;
    opacity:0.7;
}

@keyframes flotar{
    0%{
        transform:translateY(100vh) scale(0);
    }
    100%{
        transform:translateY(-120vh) scale(1.5);
    }
}

/* Tarjeta */
.card{
    position:relative;
    width:350px;
    height:500px;
    perspective:1200px;
}

.carta{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1s;
}

.card.open .carta{
    transform:rotateY(180deg);
}

/* Frente */
.frente, .dentro{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:25px;
    backface-visibility:hidden;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* Frente */
.frente{
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.frente img{
    width:220px;
    animation:latido 1.5s infinite;
}

@keyframes latido{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
}

.frente h1{
    margin-top:20px;
    color:#ff2e63;
    text-align:center;
    font-size:30px;
}

.frente p{
    margin-top:10px;
    color:#555;
    text-align:center;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff2e63;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff0055;
    transform:scale(1.05);
}

/* Interior */
.dentro{
    background:#fff0f5;
    transform:rotateY(180deg);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.mensaje{
    text-align:center;
    color:#b30059;
    font-size:22px;
    line-height:1.6;
    animation:aparecer 2s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<!-- Corazones -->
<script>
for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="corazon";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*5+5)+"s";
    heart.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(heart);
}
</script>

<div class="card" id="card">
    <div class="carta">

        <!-- Frente -->
        <div class="frente">
            <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
            <h1>Para el Mejor Novio ❤️</h1>
            <p>Toca el botón para abrir la carta</p>
            <button onclick="abrirCarta()">Abrir Carta</button>
        </div>

        <!-- Interior -->
        <div class="dentro">
            <div class="mensaje">
                Mi amor ❤️<br><br>
                Gracias por estar conmigo, por hacer mis días más felices y por regalarme tanto amor.<br><br>
                Eres mi persona favorita y siempre ocuparás un lugar especial en mi corazón 💖
            </div>
        </div>

    </div>
</div>

<script>
function abrirCarta(){
    document.getElementById("card").classList.toggle("open");
}
</script>

</body>
</html>
